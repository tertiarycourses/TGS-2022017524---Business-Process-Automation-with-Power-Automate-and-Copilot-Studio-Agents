<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACME Help Chat</title>
  <style>
    :root { color-scheme: light; font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; grid-template-rows: 1fr auto; place-items: center; background: #eef3f9; color: #172033; }
    main { width: min(700px, calc(100% - 24px)); margin: 24px auto; }
    .chat { overflow: hidden; background: #fff; border: 1px solid #d8e0ec; border-radius: 20px; box-shadow: 0 20px 60px rgba(26, 44, 75, .14); }
    header { padding: 20px 24px; background: #173f73; color: #fff; }
    header h1 { margin: 0; font-size: 1.35rem; }
    header p { margin: 5px 0 0; opacity: .82; }
    .setup { display: flex; gap: 10px; padding: 16px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; }
    input, button { font: inherit; }
    input { min-width: 0; flex: 1; padding: 11px 13px; border: 1px solid #aebbd0; border-radius: 9px; }
    button { padding: 11px 15px; border: 0; border-radius: 9px; background: #1768c4; color: #fff; font-weight: 750; cursor: pointer; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    #messages { height: 430px; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 12px; }
    .message { width: fit-content; max-width: 82%; padding: 11px 14px; border-radius: 14px; line-height: 1.45; white-space: pre-wrap; }
    .bot { align-self: flex-start; background: #edf2f8; }
    .user { align-self: flex-end; background: #1768c4; color: #fff; }
    .error { align-self: flex-start; background: #fee4e2; color: #b42318; }
    .quick { padding: 0 16px 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .quick button { padding: 8px 10px; background: #e8f1ff; color: #174e91; font-size: .9rem; }
    form { display: flex; gap: 10px; padding: 16px; border-top: 1px solid #e2e8f0; }
    .hint { margin: 10px 16px 16px; color: #68758a; font-size: .82rem; }
    .powered-footer { width: 100%; padding: 18px; text-align: center; color: #5c667a; font-size: .8rem; }
    .powered-footer a { color: #075985; text-decoration: none; }
    .powered-footer a:hover { text-decoration: underline; }
    @media (max-width: 560px) { .setup, form { flex-direction: column; } #messages { height: 55vh; } }
  </style>
</head>
<body>
  <main>
    <section class="chat">
      <header>
        <h1>ACME Help Chat</h1>
        <p>Power Automate webhook lab</p>
      </header>
      <div class="setup">
        <input id="endpoint" type="url" aria-label="Power Automate webhook URL" placeholder="Paste private Power Automate webhook URL">
        <button id="connect" type="button">Connect</button>
      </div>
      <div id="messages" role="log" aria-live="polite">
        <div class="message bot">Hello! Connect your lab webhook, then ask about opening hours, contact details, or account-opening documents.</div>
      </div>
      <div class="quick">
        <button type="button" data-message="opening hours">Opening hours</button>
        <button type="button" data-message="contact details">Contact details</button>
        <button type="button" data-message="documents">Account documents</button>
      </div>
      <form id="chat-form">
        <input id="message" autocomplete="off" aria-label="Chat message" placeholder="Type a message" disabled>
        <button id="send" type="submit" disabled>Send</button>
      </form>
      <p class="hint">Lab use only. The URL remains in memory for this page session and is not saved.</p>
    </section>
  </main>
  <footer class="powered-footer">
    Powered by <a href="https://www.tertiaryinfotech.com/" target="_blank" rel="noopener">Tertiary Infotech Academy Pte Ltd</a>
  </footer>
  <script>
    const endpointInput = document.querySelector("#endpoint");
    const connectButton = document.querySelector("#connect");
    const form = document.querySelector("#chat-form");
    const messageInput = document.querySelector("#message");
    const sendButton = document.querySelector("#send");
    const messages = document.querySelector("#messages");
    const quickButtons = [...document.querySelectorAll("[data-message]")];
    const sessionId = `web-${crypto.randomUUID ? crypto.randomUUID() : Date.now()}`;
    let endpoint = "";

    function addMessage(text, role) {
      const item = document.createElement("div");
      item.className = `message ${role}`;
      item.textContent = text;
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    }

    connectButton.addEventListener("click", () => {
      endpoint = endpointInput.value.trim();
      if (!endpoint) {
        addMessage("Paste a valid Power Automate URL first.", "error");
        return;
      }
      messageInput.disabled = false;
      sendButton.disabled = false;
      messageInput.focus();
      addMessage("Connected for this page session.", "bot");
    });

    async function sendMessage(message) {
      if (!endpoint) {
        addMessage("Connect the webhook before sending a message.", "error");
        return;
      }
      addMessage(message, "user");
      sendButton.disabled = true;
      messageInput.disabled = true;

      try {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=UTF-8" },
          body: JSON.stringify({ sessionId, message })
        });
        const body = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(body.message || `Request failed (${response.status})`);
        addMessage(body.reply || "The flow returned no reply.", "bot");
      } catch (error) {
        addMessage(`${error.message}. Check the flow run history, authentication, and CORS settings.`, "error");
      } finally {
        sendButton.disabled = false;
        messageInput.disabled = false;
        messageInput.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const message = messageInput.value.trim();
      if (!message) return;
      messageInput.value = "";
      sendMessage(message);
    });

    quickButtons.forEach((button) => {
      button.addEventListener("click", () => sendMessage(button.dataset.message));
    });
  </script>
</body>
</html>
