<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACME Business Banking Enquiry</title>
  <style>
    :root { color-scheme: light; font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f4f7fb; color: #172033; }
    main { width: min(720px, calc(100% - 32px)); margin: 40px auto; }
    .card { background: #fff; border: 1px solid #dce3ee; border-radius: 18px; padding: 28px; box-shadow: 0 18px 50px rgba(31, 48, 80, .1); }
    h1 { margin: 0 0 8px; font-size: clamp(1.8rem, 5vw, 2.5rem); }
    p { line-height: 1.55; }
    .notice { padding: 12px 14px; background: #fff8e7; border: 1px solid #f1d083; border-radius: 10px; font-size: .92rem; }
    form { display: grid; gap: 16px; margin-top: 24px; }
    label { display: grid; gap: 7px; font-weight: 650; }
    input, textarea { width: 100%; padding: 12px 14px; border: 1px solid #b8c4d6; border-radius: 9px; font: inherit; }
    input:focus, textarea:focus { outline: 3px solid #d7e6ff; border-color: #2563eb; }
    textarea { min-height: 130px; resize: vertical; }
    button { padding: 13px 18px; border: 0; border-radius: 10px; background: #1557b0; color: #fff; font: inherit; font-weight: 750; cursor: pointer; }
    button:disabled { opacity: .6; cursor: wait; }
    #status { min-height: 24px; margin-top: 16px; font-weight: 650; }
    .ok { color: #087443; }
    .error { color: #b42318; }
    small { color: #526078; font-weight: 400; }
    .powered-footer { padding: 20px; text-align: center; color: #5c667a; font-size: .8rem; }
    .powered-footer a { color: #075985; text-decoration: none; }
    .powered-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Business banking enquiry</h1>
      <p>Ask ACME Customer Operations about account-opening documents and processing times.</p>
      <p class="notice"><strong>Lab use only:</strong> paste the Power Automate URL at run time. This page does not store it.</p>
      <form id="enquiry-form">
        <label>
          Power Automate webhook URL
          <input id="endpoint" type="url" required placeholder="https://...logic.azure.com/...">
          <small>Keep this production URL private.</small>
        </label>
        <label>
          Full name
          <input id="name" autocomplete="name" required>
        </label>
        <label>
          Email
          <input id="email" type="email" autocomplete="email" required>
        </label>
        <label>
          Subject
          <input id="subject" required value="SME current account documents">
        </label>
        <label>
          Message
          <textarea id="message" required>Please send me the onboarding document checklist and expected processing time.</textarea>
        </label>
        <button id="submit-button" type="submit">Submit enquiry</button>
      </form>
      <p id="status" role="status" aria-live="polite"></p>
    </section>
  </main>
  <footer class="powered-footer">
    Powered by <a href="https://www.tertiaryinfotech.com/" target="_blank" rel="noopener">Tertiary Infotech Academy Pte Ltd</a>
  </footer>
  <script>
    const form = document.querySelector("#enquiry-form");
    const button = document.querySelector("#submit-button");
    const status = document.querySelector("#status");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      status.className = "";
      status.textContent = "Sending...";

      const endpoint = document.querySelector("#endpoint").value.trim();
      const payload = {
        name: document.querySelector("#name").value.trim(),
        email: document.querySelector("#email").value.trim(),
        subject: document.querySelector("#subject").value.trim(),
        message: document.querySelector("#message").value.trim()
      };

      try {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=UTF-8" },
          body: JSON.stringify(payload)
        });
        const body = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(body.message || `Request failed (${response.status})`);
        status.className = "ok";
        status.textContent = body.message || "Your enquiry was submitted.";
        form.reset();
      } catch (error) {
        status.className = "error";
        status.textContent = `${error.message}. Check the URL, flow run history, authentication, and CORS settings.`;
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
